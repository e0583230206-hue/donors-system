name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          # Must be whichever user actually runs the live pm2 process (verify
          # with `pm2 list` on the server as that user, or `pm2 list` as root
          # if pm2 was started under root) — pm2's process list is per-user,
          # so restarting from the wrong user will fail with "process not found".
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/donors-system
            git pull origin master
            cd frontend/backend
            npm ci --omit=dev
            # Idempotent — only ever inserts a row that's still missing by
            # audioId, never touches an existing one. Safe to run on every
            # deploy forever; a no-op once all rows already exist.
            node seed-ident-audio.js
            # Same idempotent insert-only pattern as above, for the 24
            # PAYMSG-3000..3023 systemMessages rows (see
            # seed-paymsg-audio.test.js). Does not set audioFile1/2/3 or
            # touch IVR_AUDIO_PAYMSG_MODE — the payment-messages feature
            # stays off until explicitly enabled.
            node seed-paymsg-audio.js
            pm2 restart donors --update-env
