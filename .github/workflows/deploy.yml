name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          # Use a dedicated non-root deploy user with minimal permissions.
          # Setup on server:
          #   adduser --disabled-password deploy
          #   usermod -aG www-data deploy
          #   chown -R deploy:www-data /var/www/donors-system
          #   # Add SSH key to /home/deploy/.ssh/authorized_keys
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/donors-system
            git pull origin master
            cd frontend/backend
            npm ci --omit=dev
            pm2 restart crm-ivr-server --update-env
