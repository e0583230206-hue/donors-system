name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          # Must be whichever user actually runs the live pm2 process (verify
          # with `pm2 list` on the server as that user, or `pm2 list` as root
          # if pm2 was started under root) — pm2's process list is per-user,
          # so restarting from the wrong user will fail with "process not found".
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/donors-system
            git pull origin master
            cd frontend/backend
            npm ci --omit=dev
            pm2 restart donors --update-env
