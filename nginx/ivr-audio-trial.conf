# ivr-audio-trial.conf — קטע Nginx זמני לניסוי fileLink/fileName של טכנוליין
#
# קובץ נפרד במכוון מ-ivr-site.conf (הפרודקשן) — כך שהוא ניתן להסרה/הכללה
# בלי לגעת בכלל בבלוק /ivr הפעיל. לא מופעל/נטען אוטומטית — יש לכלול אותו
# ידנית ב-nginx רק כשמתחילים בפועל בניסוי, ולהסיר כשמסיימים.
#
# הוראות שימוש:
#   כלול קובץ זה בתוך בלוק server{} הראשי (אותו server block של ivr-site.conf):
#     include /etc/nginx/conf.d/ivr-audio-trial.conf;
#
# ─── אילוץ טכני — HTTP בלבד, זהה בדיוק ל-/ivr ────────────────────────────────
# טכנוליין (מרכזיה PBX) אינו תומך ב-HTTPS עבור callbacks יוצאים של ה-Module
# API, ואינו תומך ב-Header מותאם אישית — לכן ה-trialKey מגיע ב-query string,
# בדיוק כמו ivrKey ב-/ivr. ראו requireIvrKey/isAuthorized ב-server.js /
# ivr-audio-trial.route.js.
# SECURITY MITIGATIONS (מראה בדיוק את אלה של ivr-site.conf):
#   1. access_log מכובה — מונע שמירת trialKey מה-query string בלוגים.
#   2. Nginx רץ כמשתמש nginx (לא root) — הגבלת חשיפת הלוג.
#   3. ה-route בצד Node עצמו לא רושם req.query/trialKey/PBXextensionId בשום
#      מצב (ראו ivr-audio-trial.route.js) — זו הגנה כפולה, לא רק כאן.
# ─────────────────────────────────────────────────────────────────────────────

location /ivr-audio-trial {
    # disable access log to prevent trialKey from being stored in log files
    access_log off;

    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

    # Same short timeouts as /ivr — this is a live-call callback too.
    proxy_read_timeout  10s;
    proxy_send_timeout  10s;
    proxy_connect_timeout 5s;
}
