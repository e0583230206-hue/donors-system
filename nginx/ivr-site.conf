# ivr-site.conf — קטע Nginx להגדרת endpoint /ivr
#
# הוראות שימוש:
#   כלול קובץ זה בתוך בלוק server{} הראשי:
#     include /etc/nginx/conf.d/ivr-site.conf;
#
# ─── אילוץ טכני — HTTP בלבד ──────────────────────────────────────────────────
# טכנוליין (מרכזיה PBX) אינו תומך ב-HTTPS עבור callbacks יוצאים.
# לכן endpoint /ivr פועל על HTTP.
# SECURITY MITIGATIONS:
#   1. access_log מכובה עבור /ivr — מונע שמירת ivrKey מה-query string בלוגים.
#   2. Nginx רץ כמשתמש nginx (לא root) — הגבלת חשיפת הלוג.
#   3. ivrKey נמצא בתוך query string (אין תמיכת Header ב-Technoline) — יש לשקול
#      רוטציה תקופתית של IVR_KEY ב-.env אם ה-HTTP traffic חשוף לרשת.
#   4. אם ניתן בעתיד — יש להעביר לתעבורת HTTPS עם Technoline.
# ─────────────────────────────────────────────────────────────────────────────

location /ivr {
    # disable access log to prevent ivrKey from being stored in log files
    access_log off;

    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

    # IVR requests are time-sensitive — short timeouts
    proxy_read_timeout  10s;
    proxy_send_timeout  10s;
    proxy_connect_timeout 5s;
}
