# uploads-ivr-audio.conf — location ייעודי ל-/uploads/ivr-audio/
#
# בעיה שתוקנה: בלי ה-location הזה, בקשות ל-/uploads/ivr-audio/<file> נבלעות
# ע"י ה-SPA fallback הכללי (location / עם try_files .../index.html) לפני
# שהן בכלל מגיעות ל-Node — טכנוליין (fileLink) מקבלת 200 עם text/html במקום
# קובץ השמע. ^~ מבטיח עדיפות prefix-match על פני location / הכללי, בלי
# להיכנס בכלל להתמודדות מול regex locations אחרים.
#
# express.static (server.js:240) כבר מטפל נכון ב-404/Content-Type/absence-of-
# directory-listing ברגע שהבקשה בכלל מגיעה ל-Node — ה-location הזה רק דואג
# שהיא תגיע.
#
# הוראות שימוש:
#   כלול קובץ זה בתוך שני בלוקי server{} (HTTP ו-HTTPS), אותו server block
#   הראשי שכבר כולל את ivr-site.conf:
#     include /etc/nginx/conf.d/uploads-ivr-audio.conf;

location ^~ /uploads/ivr-audio/ {
    # רק GET/HEAD — כל method אחר מקבל 405 ישירות מ-Nginx, לא מגיע ל-Node
    limit_except GET HEAD {
        deny all;
    }

    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

    # קבצי שמע יכולים להיות גדולים יחסית ולקחת רגע להוריד — טיימאאוטים
    # רגילים, לא הטיימאאוטים הקצרים של /ivr (זו לא שיחה חיה בזמן אמת)
    proxy_read_timeout  30s;
    proxy_send_timeout  30s;
    proxy_connect_timeout 5s;

    # אין autoindex בכלל בקונפיג הזה (אין root/alias, רק proxy) — אין דרך
    # ל-Nginx להציג רשימת תיקייה כאן; וממילא express.static לא עושה זאת.
}
