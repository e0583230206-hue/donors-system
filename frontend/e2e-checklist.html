  <script>
    var KEY = "e2e_checklist_v1";

    function loadState() {
      try { return JSON.parse(localStorage.getItem(KEY) || "{}"); } catch (_) { return {}; }
    }

    function saveState(state) {
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function allItems() {
      return Array.from(document.querySelectorAll(".item"));
    }

    function itemKey(el) {
      return el.querySelector("label").textContent.trim().slice(0, 60);
    }

    function applyState() {
      var state = loadState();
      allItems().forEach(function (el) {
        var cb = el.querySelector("input[type=checkbox]");
        var checked = !!state[itemKey(el)];
        cb.checked = checked;
        el.classList.toggle("done", checked);
      });
      updateProgress();
    }

    function toggle(el) {
      var cb = el.querySelector("input[type=checkbox]");
      cb.checked = !cb.checked;
      el.classList.toggle("done", cb.checked);
      var state = loadState();
      state[itemKey(el)] = cb.checked;
      saveState(state);
      updateProgress();
    }

    function updateProgress() {
      var items = allItems();
      var done  = items.filter(function (el) { return el.classList.contains("done"); }).length;
      var total = items.length;
      var pct   = total ? Math.round((done / total) * 100) : 0;
      document.getElementById("progressBar").style.width = pct + "%";
      document.getElementById("progressLabel").textContent = done + " / " + total + " בוצעו (" + pct + "%)";
    }

    function checkAll() {
      var state = loadState();
      allItems().forEach(function (el) {
        var cb = el.querySelector("input[type=checkbox]");
        cb.checked = true;
        el.classList.add("done");
        state[itemKey(el)] = true;
      });
      saveState(state);
      updateProgress();
    }

    function uncheckAll() {
      if (!confirm("לנקות את כל הסימונים?")) return;
      localStorage.removeItem(KEY);
      allItems().forEach(function (el) {
        el.querySelector("input[type=checkbox]").checked = false;
        el.classList.remove("done");
      });
      updateProgress();
    }

    function exportReport() {
      var items = allItems();
      var done  = items.filter(function (el) { return el.classList.contains("done"); });
      var fail  = items.filter(function (el) { return !el.classList.contains("done"); });
      var lines = [
        "דוח בדיקות E2E — " + new Date().toLocaleString("he-IL"),
        "=".repeat(50),
        "עברו: " + done.length + " / " + items.length,
        "",
      ];
      if (fail.length) {
        lines.push("--- לא בוצעו ---");
        fail.forEach(function (el) {
          lines.push("☐ " + el.querySelector("label").textContent.trim().replace(/\s+/g, " "));
        });
        lines.push("");
      }
      lines.push("--- בוצעו ---");
      done.forEach(function (el) {
        lines.push("☑ " + el.querySelector("label").textContent.trim().replace(/\s+/g, " "));
      });
      var blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "e2e-report-" + new Date().toISOString().slice(0, 10) + ".txt";
      a.click();
    }

    applyState();
  </script>
</body>
</html>
