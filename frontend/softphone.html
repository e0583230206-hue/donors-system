<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>טלפון רשת</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Heebo','Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1a237e 0%,#283593 55%,#3949ab 100%);
  min-height:100vh;
  color:#1a237e;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  position:relative;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:radial-gradient(circle at 20% 30%,rgba(255,255,255,0.08),transparent 60%),
              radial-gradient(circle at 80% 70%,rgba(255,255,255,0.06),transparent 55%);
  pointer-events:none;z-index:0;
}
.shell{
  position:relative;z-index:1;
  max-width:1180px;margin:0 auto;padding:30px 20px 60px;
  display:grid;grid-template-columns:1.05fr .95fr;gap:24px;
}
@media(max-width:920px){.shell{grid-template-columns:1fr;padding:20px 14px}}
header.top{
  grid-column:1/-1;background:#fff;border-radius:20px;
  box-shadow:0 8px 24px rgba(0,0,0,.10);padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:16px}
.brand .logo{
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,#1a237e,#3949ab);
  box-shadow:0 6px 18px rgba(0,0,0,.12);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:#fff;
}
.brand .logo svg{width:26px;height:26px}
.brand .text h1{font-size:1.25rem;margin:0;color:#1a237e;font-weight:700}
.brand .text .sub{font-size:.82rem;color:#5a6f85;margin-top:2px}
.statepill{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:999px;
  background:#f4f7fb;border:1px solid #e0e7ef;
  font-size:.88rem;color:#5a6f85;font-weight:500;
}
.dot{width:8px;height:8px;border-radius:50%;background:#9aa7b6}
.s-idle .dot{background:#9aa7b6}
.s-connecting .dot{background:#f59e0b;animation:pulse 1.2s infinite}
.s-registered .dot{background:#10b981;box-shadow:0 0 0 4px rgba(16,185,129,.18)}
.s-failed .dot{background:#ef4444}
.s-in-call .dot{background:#3949ab;box-shadow:0 0 0 4px rgba(57,73,171,.18);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.card{background:#fff;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.08);overflow:hidden}
.card .head{
  padding:16px 22px 12px;
  display:flex;align-items:baseline;justify-content:space-between;
  border-bottom:1px solid #eef1f5;
}
.card .head h2{margin:0;font-size:1rem;font-weight:700;color:#1a237e}
.card .head .hint{color:#9aa7b6;font-size:.78rem}
.dialer{display:flex;flex-direction:column}
.display{padding:30px 28px 14px;text-align:center;position:relative}
.display .who{font-size:.85rem;color:#5a6f85;min-height:20px;font-weight:500}
.display .num{
  font-family:'JetBrains Mono',ui-monospace,monospace;
  font-size:38px;font-weight:600;letter-spacing:.02em;
  margin:8px 0 4px;min-height:54px;
  direction:ltr;color:#1a237e;word-break:break-all;
}
.display .num.empty{color:#cdd6e0;font-weight:400}
.display .timer{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:#9aa7b6;min-height:20px}
.dtmf-ribbon{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:#1a237e;color:#fff;
  font-family:'JetBrains Mono',monospace;font-weight:600;
  padding:6px 16px;border-radius:999px;font-size:1.05rem;letter-spacing:.15em;
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;
  box-shadow:0 6px 18px rgba(0,0,0,.2);direction:ltr;
}
.dtmf-ribbon.show{opacity:1;transform:translateX(-50%) translateY(2px)}
.pad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:8px 22px 18px;direction:ltr;
}
.key{
  background:#f8fafc;border:1px solid #e0e7ef;border-radius:14px;
  padding:14px 0 11px;cursor:pointer;
  transition:transform .08s,background .15s,border-color .15s,box-shadow .15s;
  user-select:none;font-family:'Heebo',sans-serif;
}
.key:hover{background:#fff;border-color:#3949ab;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.key:active{transform:scale(.96)}
.key.pressed{background:#3949ab;color:#fff;border-color:#3949ab}
.key .d{font-size:24px;font-weight:600;color:#1a237e}
.key.pressed .d{color:#fff}
.key .l{font-size:9px;color:#9aa7b6;letter-spacing:.18em;margin-top:2px;font-weight:600}
.key.pressed .l{color:rgba(255,255,255,.85)}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px 22px 22px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:13px 14px;border-radius:14px;
  font-family:'Heebo',sans-serif;font-size:.94rem;font-weight:600;
  border:1px solid #e0e7ef;background:#f8fafc;color:#1a237e;
  cursor:pointer;transition:transform .08s,background .15s,border-color .15s,box-shadow .15s;
}
.btn:hover{background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.btn:active{transform:scale(.98)}
.btn.primary{
  background:linear-gradient(135deg,#3949ab 0%,#1a237e 100%);
  color:#fff;border-color:transparent;
  box-shadow:0 8px 22px rgba(57,73,171,.28);
}
.btn.primary:hover{box-shadow:0 10px 28px rgba(57,73,171,.36)}
.btn.danger{
  background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);
  color:#fff;border-color:transparent;
  box-shadow:0 8px 22px rgba(239,68,68,.28);
}
.btn.danger:hover{box-shadow:0 10px 28px rgba(239,68,68,.36)}
.btn[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}
.panel{display:flex;flex-direction:column;gap:20px}
.form{padding:16px 22px 20px;display:grid;gap:12px}
.field{display:grid;gap:6px}
.field label{font-size:.8rem;color:#5a6f85;font-weight:600}
.field input{
  background:#f8fafc;border:2px solid #e0e7ef;color:#1a237e;
  padding:11px 13px;border-radius:12px;
  font-family:'Heebo',sans-serif;font-size:.95rem;
  direction:ltr;text-align:left;transition:border-color .15s,box-shadow .15s;
}
.field input:focus{outline:none;border-color:#3949ab;background:#fff;box-shadow:0 0 0 4px rgba(57,73,171,.18)}
.exthint{font-size:.8rem;color:#9aa7b6;margin-top:4px;min-height:18px;font-weight:500}
.formfoot{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:6px}
.tinybtn{
  font-size:.82rem;color:#5a6f85;background:#f4f7fb;border:1px solid #e0e7ef;
  padding:9px 16px;border-radius:10px;cursor:pointer;
  font-family:'Heebo',sans-serif;font-weight:600;
}
.tinybtn:hover{color:#1a237e;border-color:#3949ab;background:#fff}
.tinybtn.go{background:linear-gradient(135deg,#3949ab,#1a237e);color:#fff;border-color:transparent}
.tinybtn.go:hover{color:#fff}
.history{padding:0;max-height:340px;overflow-y:auto}
.history-empty{padding:30px 22px;text-align:center;color:#9aa7b6;font-size:.88rem}
.history-row{
  display:flex;align-items:center;gap:12px;padding:12px 22px;
  border-bottom:1px solid #f0f3f7;cursor:pointer;transition:background .12s;
}
.history-row:hover{background:#f8fafc}
.history-row:last-child{border-bottom:none}
.history-row .ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.history-row .ico.out{background:#e8eaf6;color:#1a237e}
.history-row .ico.in{background:#e3f2fd;color:#1976d2}
.history-row .ico.missed{background:#ffebee;color:#c62828}
.history-row .body{flex:1;min-width:0}
.history-row .num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:.95rem;color:#1a237e;direction:ltr;text-align:left}
.history-row .meta{font-size:.75rem;color:#9aa7b6;margin-top:2px}
.history-row .dur{font-size:.78rem;color:#5a6f85;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.log{padding:6px 22px 16px;font-family:'JetBrains Mono',monospace;font-size:.78rem;max-height:200px;overflow:auto;direction:ltr;text-align:left}
.log .line{padding:5px 0;border-bottom:1px dashed #f0f3f7;color:#5a6f85}
.log .line.ok{color:#1a237e}
.log .line.warn{color:#b45309}
.log .line.err{color:#b91c1c}
.log .line .t{color:#9aa7b6;margin-inline-end:8px}
.incoming-block{
  margin:8px 22px 14px;padding:18px 18px 16px;border-radius:14px;
  background:linear-gradient(135deg,#e8eaf6 0%,#c5cae9 100%);
  border:2px solid #3949ab;display:none;text-align:center;
  animation:incomingPulse 1.5s ease-in-out infinite;
}
.incoming-block.show{display:block}
@keyframes incomingPulse{0%,100%{box-shadow:0 0 0 0 rgba(57,73,171,.45)}50%{box-shadow:0 0 0 14px rgba(57,73,171,0)}}
.incoming-icon{font-size:2.2rem;line-height:1;animation:wiggle .6s ease-in-out infinite;display:inline-block}
@keyframes wiggle{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
.incoming-title{font-size:.95rem;font-weight:700;color:#1a237e;margin-top:6px}
.incoming-from{font-size:1.35rem;font-family:'JetBrains Mono',monospace;color:#1a237e;margin:10px 0 6px;direction:ltr;font-weight:600}
.incoming-ctx{margin:6px auto 14px;padding:10px 14px;border-radius:12px;background:#fff;border:1.5px solid #3949ab;max-width:280px}
.incoming-ctx .ctx-route{font-size:1.05rem;font-weight:700;color:#1a237e}
.incoming-ctx .ctx-price{font-size:1.6rem;font-weight:800;color:#1a237e;font-family:'JetBrains Mono',monospace;margin-top:2px}
.call-ctx{margin:0 22px 8px;padding:8px 14px;border-radius:10px;text-align:center;background:#e8eaf6;border:1px solid #3949ab;color:#1a237e;font-weight:700;display:none}
.call-ctx.show{display:block}
.incoming-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn.big{padding:16px 18px;font-size:1.05rem}
.fail-block{
  margin:8px 22px 14px;padding:16px 18px;border-radius:14px;
  background:linear-gradient(135deg,#fff5f5,#ffe4e6);
  border:1.5px solid #fca5a5;display:none;
  box-shadow:0 4px 14px rgba(220,38,38,.10);
}
.fail-block.show{display:block;animation:failpulse .35s ease-out}
@keyframes failpulse{0%{transform:scale(.97);opacity:.5}100%{transform:scale(1);opacity:1}}
.fail-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fail-icon{font-size:1.2rem;color:#dc2626}
.fail-title{font-size:.98rem;font-weight:700;color:#991b1b}
.fail-reason{font-size:.88rem;color:#7f1d1d;line-height:1.5;margin-bottom:12px;padding-right:26px}
.fail-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
audio{display:none}
footer.foot{grid-column:1/-1;margin-top:8px;text-align:center;color:rgba(255,255,255,.85);font-size:.78rem}
footer.foot kbd{font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.24);color:#fff}
</style>
</head>
<body>

<div class="shell">
  <header class="top">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z"/></svg>
      </div>
      <div class="text">
        <h1>טלפון רשת</h1>
        <div class="sub">שיחות SIP דרך הדפדפן</div>
      </div>
    </div>
    <div id="statePill" class="statepill s-idle">
      <span class="dot"></span>
      <span id="stateText">לא מחובר</span>
    </div>
  </header>

  <!-- Dialer -->
  <section class="card dialer">
    <div class="head">
      <h2>חיוג</h2>
      <span class="hint">הקש מספר או השתמש בלחצנים</span>
    </div>

    <div class="display">
      <div class="who" id="who">&nbsp;</div>
      <div class="num empty" id="num">__________</div>
      <div class="timer" id="timer">&nbsp;</div>
      <div class="dtmf-ribbon" id="dtmfRibbon"></div>
    </div>

    <!-- Incoming call -->
    <div class="incoming-block" id="incomingBlock">
      <div class="incoming-icon">📞</div>
      <div class="incoming-title">שיחה נכנסת</div>
      <div class="incoming-from" id="incomingFrom">—</div>
      <div class="incoming-ctx" id="incomingCtx" style="display:none"></div>
      <div class="incoming-actions">
        <button class="btn primary big" id="btnAnswer">📲 ענה</button>
        <button class="btn danger big" id="btnReject">✕ דחה</button>
      </div>
    </div>

    <!-- Donor banner during call -->
    <div class="call-ctx" id="callCtx"></div>

    <!-- Failure -->
    <div class="fail-block" id="failBlock">
      <div class="fail-head">
        <span class="fail-icon">⚠</span>
        <span class="fail-title">שיחה נכשלה</span>
      </div>
      <div class="fail-reason" id="failReason">—</div>
      <div class="fail-actions">
        <button class="btn primary" id="btnRedial">↩ חייג שוב</button>
        <button class="btn" id="btnFailCancel">✕ ביטול</button>
      </div>
    </div>

    <div class="pad" id="pad"></div>

    <div class="actions" id="actionsRow">
      <button class="btn" id="btnBack" title="מחק (Backspace)">⌫ מחק</button>
      <button class="btn primary" id="btnCall">📞 התקשר</button>
      <button class="btn danger" id="btnHangup" disabled>✕ נתק</button>
    </div>
  </section>

  <!-- Right panel -->
  <aside class="panel">
    <section class="card">
      <div class="head" id="connHead" style="cursor:pointer">
        <h2>הגדרות חיבור</h2>
        <span class="hint" id="connToggle">▼ הצג</span>
      </div>
      <div class="form" id="connForm" style="display:none">
        <div class="field">
          <label for="s_server">כתובת שרת (WSS)</label>
          <input id="s_server" type="text" placeholder="wss://server:8089/ws" autocomplete="off">
        </div>
        <div class="field">
          <label for="s_ext">מספר שלוחה</label>
          <input id="s_ext" type="text" placeholder="200" autocomplete="off">
        </div>
        <div class="field">
          <label for="s_user">שם משתמש SIP</label>
          <input id="s_user" type="text" placeholder="MESERXXXXXX" autocomplete="off">
        </div>
        <div class="field">
          <label for="s_pass">סיסמה SIP</label>
          <input id="s_pass" type="password" placeholder="••••••••" autocomplete="off">
        </div>
        <div class="exthint" id="extInfo">&nbsp;</div>
        <div class="formfoot">
          <button class="tinybtn" id="btnUnregister">✕ נתק</button>
          <button class="tinybtn go" id="btnRegister">🔌 התחבר לשרת</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="head">
        <h2>היסטוריית שיחות</h2>
        <span class="hint"><a href="#" id="clearHistory" style="color:#9aa7b6;text-decoration:none">נקה</a></span>
      </div>
      <div class="history" id="history">
        <div class="history-empty">אין שיחות עדיין</div>
      </div>
    </section>

    <section class="card">
      <div class="head">
        <h2>לוג</h2>
        <span class="hint">SIP signaling</span>
      </div>
      <div class="log" id="log"></div>
    </section>
  </aside>

  <footer class="foot">
    קיצורי מקלדת: <kbd>0-9</kbd> חיוג · <kbd>Backspace</kbd> מחק · <kbd>Enter</kbd> התקשר · <kbd>Esc</kbd> נתק
  </footer>
</div>

<audio id="remoteAudio" autoplay></audio>

<script src="lib/jssip.min.js"></script>
<script src="lib/jquery.min.js"></script>
<script>
(function () {
  'use strict';

  // ── Auth guard ──────────────────────────────────────────────────────────────
  // sessionStorage is tab-isolated; the main app writes a one-time token to
  // localStorage so the new tab can pick it up and then immediately clear it.
  var authToken = sessionStorage.getItem('authToken') || localStorage.getItem('_sp_token') || '';
  if (authToken) {
    sessionStorage.setItem('authToken', authToken);  // promote to this tab's session
    localStorage.removeItem('_sp_token');            // clean up immediately
  } else {
    window.location.href = '/'; return;
  }

  // Add auth header to all jQuery AJAX requests
  $.ajaxSetup({
    beforeSend: function (xhr) {
      xhr.setRequestHeader('Authorization', 'Bearer ' + authToken);
    }
  });

  // ── DOM refs ────────────────────────────────────────────────────────────────
  var $log        = $('#log');
  var $num        = $('#num');
  var $who        = $('#who');
  var $timer      = $('#timer');
  var $pill       = $('#statePill');
  var $pillText   = $('#stateText');

  var ua = null, session = null;
  var dialed = '', callStart = 0, timerHandle = null, domainForCalls = '';

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function esc(s) { return $('<span>').text(s || '').html(); }

  function log(msg, lvl) {
    lvl = lvl || 'info';
    var t   = new Date().toLocaleTimeString('he-IL', { hour12: false });
    var $ln = $('<div class="line"></div>').addClass(lvl);
    $ln.append($('<span class="t"></span>').text('[' + t + ']'));
    $ln.append(document.createTextNode(' ' + msg));
    $log.prepend($ln);
    while ($log.children().length > 200) $log.children().last().remove();
  }

  function setState(s, label) { $pill.attr('class', 'statepill s-' + s); $pillText.text(label); }
  function setExtInfo(t)      { $('#extInfo').text(t || ' '); }

  function fmtPhone(n) {
    var d = String(n || '').replace(/\D/g, '');
    if (d && d[0] !== '0' && (d.length === 8 || d.length === 9)) d = '0' + d;
    return d || String(n || '');
  }

  var MAX_DIGITS = 15, currentCallNumber = '';

  function renderNum() {
    var show = currentCallNumber || dialed;
    if (show) { $num.removeClass('empty').text(show); }
    else       { $num.addClass('empty').text('__________'); }
  }
  function startTimer() {
    callStart = Date.now(); stopTimer();
    timerHandle = setInterval(function () {
      var s = Math.floor((Date.now() - callStart) / 1000);
      $timer.text(String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0'));
    }, 500);
  }
  function stopTimer() { if (timerHandle) { clearInterval(timerHandle); timerHandle = null; } $timer.html('&nbsp;'); }

  // DTMF ribbon
  var $dtmfRibbon = $('#dtmfRibbon');
  var dtmfBuffer = '', dtmfHideHandle = null;
  function showDtmf(d) {
    dtmfBuffer = (dtmfBuffer + d).slice(-12);
    $dtmfRibbon.text(dtmfBuffer).addClass('show');
    if (dtmfHideHandle) clearTimeout(dtmfHideHandle);
    dtmfHideHandle = setTimeout(function () { $dtmfRibbon.removeClass('show'); dtmfBuffer = ''; }, 2500);
  }
  function clearDtmf() {
    dtmfBuffer = '';
    if (dtmfHideHandle) { clearTimeout(dtmfHideHandle); dtmfHideHandle = null; }
    $dtmfRibbon.removeClass('show').text('');
  }

  // ── Dial pad ─────────────────────────────────────────────────────────────────
  var KEYS = [
    ['1',''],['2','ABC'],['3','DEF'],
    ['4','GHI'],['5','JKL'],['6','MNO'],
    ['7','PQRS'],['8','TUV'],['9','WXYZ'],
    ['*',''],['0','+'],['#','']
  ];
  KEYS.forEach(function (k) {
    var $b = $('<button class="key"></button>')
      .append($('<div class="d"></div>').text(k[0]))
      .append($('<div class="l"></div>').text(k[1]));
    $b.on('click', function () { pressKey(k[0]); });
    $('#pad').append($b);
  });

  function resetFailureIfAny() {
    if (!session && ($('#failBlock').hasClass('show') || currentCallNumber)) {
      hideFailureState(); currentCallNumber = ''; $who.html('&nbsp;');
      if (ua && ua.isRegistered && ua.isRegistered()) setState('registered', 'מחובר למרכזייה');
    }
  }
  function pressKey(d) {
    if (session && session.isEstablished && session.isEstablished()) {
      try { session.sendDTMF(d); } catch (e) {}
      showDtmf(d); flashKey(d); return;
    }
    resetFailureIfAny();
    if (/^[0-9]$/.test(d) && dialed.replace(/[^0-9]/g, '').length >= MAX_DIGITS) return;
    dialed += d; flashKey(d); renderNum();
  }
  function flashKey(d) {
    var $k = $('.key').filter(function () { return $(this).find('.d').text() === d; }).first();
    if (!$k.length) return;
    $k.addClass('pressed');
    setTimeout(function () { $k.removeClass('pressed'); }, 180);
  }

  // ── SIP config ───────────────────────────────────────────────────────────────
  function readSettings() {
    return {
      server: $('#s_server').val().trim(),
      ext:    $('#s_ext').val().trim(),
      user:   $('#s_user').val().trim(),
      pass:   $('#s_pass').val()
    };
  }

  function normalizeServer(srv) {
    srv = (srv || '').trim();
    if (!/^wss?:\/\//i.test(srv)) srv = 'wss://' + srv;
    try { var u = new URL(srv); if (!u.pathname || u.pathname === '/') u.pathname = '/ws'; return u.toString(); }
    catch (e) { return srv; }
  }
  function parseConn(s) {
    var id = (s.user || s.ext || '').trim();
    var ext = (s.ext || '').trim();
    var domain = '';
    var at = id.indexOf('@');
    if (at > -1) { domain = id.slice(at + 1); id = id.slice(0, at); }
    ext = ext.split('@')[0];
    var serverUrl = normalizeServer(s.server);
    if (!domain) {
      try { domain = new URL(serverUrl).hostname; }
      catch (e) { domain = s.server.replace(/^wss?:\/\//i, '').split(/[:/]/)[0]; }
    }
    return { serverUrl: serverUrl, user: id, ext: ext, domain: domain, pass: s.pass };
  }

  // ── Buttons ──────────────────────────────────────────────────────────────────
  $('#btnBack').on('click', function () { resetFailureIfAny(); dialed = dialed.slice(0, -1); renderNum(); });
  $('#btnCall').on('click', placeCall);
  $('#btnHangup').on('click', hangup);
  $('#btnRegister').on('click', register);
  $('#btnUnregister').on('click', unregister);
  $('#btnAnswer').on('click', answerIncoming);
  $('#btnReject').on('click', rejectIncoming);
  $('#btnRedial').on('click', function () { var t = currentCallNumber; hideFailureState(); dialed = t; currentCallNumber = ''; $who.html('&nbsp;'); renderNum(); placeCall(); });
  $('#btnFailCancel').on('click', function () { hideFailureState(); cleanupCall(); });
  $('#connHead').on('click', function () {
    var $f = $('#connForm'); var show = $f.is(':hidden');
    $f.toggle(show); $('#connToggle').text(show ? '▲ הסתר' : '▼ הצג');
  });

  // ── Keyboard ─────────────────────────────────────────────────────────────────
  $(document).on('keydown', function (e) {
    if (/^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
    if (e.key === 'Backspace') { e.preventDefault(); resetFailureIfAny(); dialed = dialed.slice(0, -1); renderNum(); return; }
    if (e.key === 'Enter')     { e.preventDefault(); placeCall(); return; }
    if (e.key === 'Escape')    { e.preventDefault(); hangup(); return; }
    if (/^[0-9*#]$/.test(e.key)) pressKey(e.key);
  });

  // ── SIP register ─────────────────────────────────────────────────────────────
  function register() {
    if (typeof JsSIP === 'undefined') { log('JsSIP לא נמצא', 'err'); return; }
    var s = readSettings();
    if (!s.server || (!s.ext && !s.user) || !s.pass) { setExtInfo('חסרים: שרת, שלוחה, סיסמה'); return; }
    if (ua) { try { ua.stop(); } catch (e) {} ua = null; }
    var c = parseConn(s);
    domainForCalls = c.domain;
    var socket;
    try { socket = new JsSIP.WebSocketInterface(c.serverUrl); }
    catch (e) { log('כתובת שרת לא תקינה: ' + (e.message || e), 'err'); return; }
    setExtInfo('מתחבר אל ' + c.domain + '…');
    log('שרת: ' + c.serverUrl + '  ·  משתמש: ' + c.user + '@' + c.domain, 'info');
    ua = new JsSIP.UA({
      sockets: [socket],
      uri: 'sip:' + c.user + '@' + c.domain,
      password: c.pass,
      register: true,
      session_timers: false,
      user_agent: 'WebSoftphone/1.0'
    });
    ua.on('connecting',         function ()  { setState('connecting', 'מתחבר…'); log('פותח WebSocket → ' + c.serverUrl, 'info'); });
    ua.on('connected',          function ()  { log('WebSocket מחובר', 'ok'); });
    ua.on('disconnected',       function ()  { setState('failed', 'נותק'); log('WebSocket נותק', 'warn'); setExtInfo('חיבור לשרת נכשל'); });
    ua.on('registered',         function ()  { setState('registered', 'מחובר למרכזייה'); log('רשום בהצלחה ב-PBX', 'ok'); setExtInfo('רשום בהצלחה ✓'); });
    ua.on('unregistered',       function ()  { setState('idle', 'לא מחובר'); log('בוצע ניתוק', 'warn'); setExtInfo('לא מחובר'); });
    ua.on('registrationFailed', function (e) {
      setState('failed', 'כשל רישום');
      var code = (e.response && e.response.status_code) || 0;
      var reason = (e.response && e.response.reason_phrase) || e.cause || '';
      log('כשל רישום: ' + reason + (code ? ' (' + code + ')' : ''), 'err');
      setExtInfo('כשל רישום: ' + (reason || code || 'לא ידוע'));
    });
    ua.on('newRTCSession', function (data) {
      var sx = data.session;
      if (sx.direction === 'incoming') {
        if (session) { try { sx.terminate({ status_code: 486, reason_phrase: 'Busy Here' }); } catch (e) {} return; }
        var from = fmtPhone((sx.remote_identity && sx.remote_identity.uri && sx.remote_identity.uri.user) || '');
        currentCallNumber = from; renderNum();
        $who.text('שיחה נכנסת מ-' + from);
        log('שיחה נכנסת מ-' + from, 'info');
        showIncoming(from, sx);
      }
      bindSession(sx);
    });
    ua.start();
  }

  function unregister() {
    if (!ua) { setExtInfo('לא מחובר'); return; }
    try { ua.stop(); } catch (e) {}
    ua = null; setState('idle', 'לא מחובר'); setExtInfo('לא מחובר'); log('מנותק', 'info');
  }

  function placeCall() {
    if (!ua || !ua.isRegistered()) { log('יש להתחבר תחילה (לחץ "התחבר לשרת")', 'warn'); setExtInfo('התחבר תחילה'); return; }
    if (!dialed) { log('אין מספר לחיוג', 'warn'); return; }
    var target = 'sip:' + dialed + '@' + (domainForCalls || 'localhost');
    log('מתקשר → ' + target, 'info');
    currentCallNumber = dialed; dialed = ''; renderNum();
    $who.text('מחייג אל ' + currentCallNumber);
    setState('connecting', 'מחייג…');
    ua.call(target, {
      mediaConstraints: { audio: true, video: false },
      rtcOfferConstraints: { offerToReceiveAudio: 1, offerToReceiveVideo: 0 }
    });
  }

  // ── Incoming call ─────────────────────────────────────────────────────────────
  var FAIL_HE = {
    'Rejected': 'השיחה נדחתה', 'Busy': 'הקו תפוס', 'Not Found': 'מספר לא קיים',
    'No Answer': 'אין מענה', 'Forbidden': 'אין הרשאה', 'Unavailable': 'לא זמין',
    'Request Timeout': 'השרת לא ענה', 'Address Incomplete': 'מספר לא תקין'
  };
  function fmtFailReason(cause, code) {
    return (FAIL_HE[cause] || cause || 'שיחה נכשלה') + (code ? ' (' + code + ')' : '');
  }

  var ringtone = null;
  function startRingtone() {
    if (ringtone) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
      var ctx = new AC(); var gain = ctx.createGain(); gain.gain.value = 0.18; gain.connect(ctx.destination);
      ringtone = { ctx: ctx, gain: gain, timer: null, alive: true };
      var tone = function () {
        if (!ringtone || !ringtone.alive) return;
        try {
          var o1 = ctx.createOscillator(); o1.frequency.value = 440; o1.connect(gain);
          var o2 = ctx.createOscillator(); o2.frequency.value = 480; o2.connect(gain);
          o1.start(); o2.start();
          ringtone.timer = setTimeout(function () {
            try { o1.stop(); o2.stop(); o1.disconnect(); o2.disconnect(); } catch (e) {}
            if (ringtone && ringtone.alive) ringtone.timer = setTimeout(tone, 4000);
          }, 2000);
        } catch (e) {}
      };
      tone();
    } catch (e) { ringtone = null; }
  }
  function stopRingtone() {
    if (!ringtone) return; ringtone.alive = false;
    try { if (ringtone.timer) clearTimeout(ringtone.timer); } catch (e) {}
    try { ringtone.gain.disconnect(); } catch (e) {}
    try { ringtone.ctx.close(); } catch (e) {}
    ringtone = null;
  }

  var incomingSession = null, activeCtx = null;
  function showIncoming(from, sess) {
    incomingSession = sess; activeCtx = null;
    $('#incomingFrom').text(from || 'מספר לא ידוע');
    $('#incomingCtx').hide().empty();
    $('#callCtx').removeClass('show').empty();
    $('#incomingBlock').addClass('show');
    startRingtone();
    setState('connecting', 'שיחה נכנסת');
    lookupDonor(from);
  }
  function hideIncoming() {
    incomingSession = null; $('#incomingBlock').removeClass('show'); stopRingtone();
  }

  // Look up the donor by phone and show their name + debt
  function lookupDonor(from) {
    var phone = String(from || '').replace(/\D/g, '');
    if (!phone) return;
    $.getJSON('/api/softphone/context?phone=' + encodeURIComponent(phone))
      .done(function (r) {
        var c = r && r.context;
        if (!c) return;
        activeCtx = c;
        var nameHtml = esc(c.name || 'לא ידוע');
        var debtText = c.debt ? c.debt + ' ₪' : 'אין חוב';
        var purposeText = c.purpose ? ' (' + c.purpose + ')' : '';
        $('#incomingCtx').html(
          '<div class="ctx-route">' + nameHtml + '</div>' +
          '<div class="ctx-price">' + esc(debtText) + '</div>' +
          (c.purpose ? '<div style="font-size:.8rem;color:#5a6f85;margin-top:4px">' + esc(purposeText) + '</div>' : '')
        ).show();
        $('#callCtx').html(nameHtml + (c.debt ? ' · <span style="font-family:JetBrains Mono">' + c.debt + ' ₪</span>' : '')).addClass('show');
        log('תורם מזוהה: ' + c.name + (c.debt ? ' | חוב: ' + c.debt + ' ₪' : ''), 'ok');
      });
  }

  function answerIncoming() {
    if (!incomingSession) return;
    try { incomingSession.answer({ mediaConstraints: { audio: true, video: false }, rtcOfferConstraints: { offerToReceiveAudio: 1, offerToReceiveVideo: 0 } }); }
    catch (e) { log('שגיאה במענה: ' + (e.message || e), 'err'); }
    hideIncoming();
  }
  function rejectIncoming() {
    if (!incomingSession) return;
    try { incomingSession.terminate({ status_code: 486, reason_phrase: 'Busy Here' }); } catch (e) {}
    hideIncoming();
    if (ua && ua.isRegistered()) setState('registered', 'מחובר למרכזייה');
  }

  function showFailureState(number, reason) {
    $who.text('כשל בשיחה עם ' + (number || '—'));
    $('#failReason').text(reason); $('#failBlock').addClass('show');
  }
  function hideFailureState() { $('#failBlock').removeClass('show'); }

  function bindSession(s) {
    session = s;
    var dir    = (s.direction === 'incoming') ? 'in' : 'out';
    var peerNum = (s.remote_identity && s.remote_identity.uri && s.remote_identity.uri.user) || currentCallNumber || dialed || '';
    var acceptedAt = 0;

    $('#btnHangup').prop('disabled', false); hideFailureState();

    s.on('progress', function () {
      setState('connecting', 'מצלצל…'); log('מצלצל', 'info');
      if (dir === 'out') $who.text('מצלצל אל ' + (currentCallNumber || peerNum));
    });
    s.on('accepted', function () {
      hideIncoming(); setState('in-call', 'בשיחה'); log('שיחה התחברה', 'ok');
      $who.text('בשיחה עם ' + (currentCallNumber || peerNum));
      currentCallNumber = currentCallNumber || peerNum; renderNum();
      acceptedAt = Date.now(); startTimer();
    });
    s.on('ended', function (e) {
      log('שיחה הסתיימה: ' + (e.cause || ''), 'info');
      var dur = acceptedAt ? Math.round((Date.now() - acceptedAt) / 1000) : 0;
      historyAdd({ ts: Date.now(), dir: dir, number: peerNum, duration: dur, cause: e.cause || 'ended' });
      cleanupCall();
    });
    s.on('failed', function (e) {
      var cause = e.cause || '', code = (e.response && e.response.status_code) || 0;
      log('שיחה נכשלה: ' + cause + (code ? ' (' + code + ')' : ''), 'err');
      historyAdd({ ts: Date.now(), dir: dir, number: peerNum, duration: 0, cause: cause || 'failed' });
      if (cause === 'Canceled' || cause === 'Terminated') { cleanupCall(); return; }
      session = null; stopTimer(); clearDtmf();
      $('#btnHangup').prop('disabled', true);
      showFailureState(currentCallNumber || peerNum, fmtFailReason(cause, code));
      setState('failed', 'כשל');
    });

    function attachRemote(pc) {
      if (!pc || pc._remoteHooked) return;
      pc._remoteHooked = true;
      pc.addEventListener('track', function (ev) {
        var ra = document.getElementById('remoteAudio');
        ra.srcObject = ev.streams && ev.streams[0] ? ev.streams[0] : new MediaStream([ev.track]);
        ra.play && ra.play().catch(function (e) { log('הדפדפן חסם השמעת אודיו: ' + (e.message || e), 'warn'); });
      });
    }
    s.on('peerconnection', function (d) { attachRemote(d && d.peerconnection); });
    if (s.connection) attachRemote(s.connection);
  }

  function hangup() { if (session) { try { session.terminate(); } catch (e) {} } }

  function cleanupCall() {
    session = null; currentCallNumber = ''; dialed = '';
    $('#btnHangup').prop('disabled', true); $who.html('&nbsp;');
    stopTimer(); clearDtmf(); hideIncoming(); renderNum();
    $('#callCtx').removeClass('show').empty();
    if (ua && ua.isRegistered()) setState('registered', 'מחובר למרכזייה');
  }

  // ── Call history ─────────────────────────────────────────────────────────────
  var HIST_LS = 'softphone_history_v1', HIST_MAX = 50;
  var history = [];
  try { history = JSON.parse(localStorage.getItem(HIST_LS) || '[]') || []; } catch (e) { history = []; }

  function historyAdd(e) {
    history.unshift(e);
    if (history.length > HIST_MAX) history.length = HIST_MAX;
    try { localStorage.setItem(HIST_LS, JSON.stringify(history)); } catch (e) {}
    renderHistory();
  }
  function fmtAgo(ts) {
    var d = Math.floor((Date.now() - ts) / 1000);
    if (d < 60)   return 'לפני ' + d + ' שניות';
    if (d < 3600) return 'לפני ' + Math.floor(d / 60) + ' דקות';
    if (d < 86400) return 'לפני ' + Math.floor(d / 3600) + ' שעות';
    var dt = new Date(ts);
    return dt.toLocaleDateString('he-IL') + ' ' + dt.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  }
  function fmtDuration(sec) {
    if (!sec) return '—';
    return String(Math.floor(sec / 60)).padStart(2, '0') + ':' + String(sec % 60).padStart(2, '0');
  }
  function renderHistory() {
    var $h = $('#history').empty();
    if (!history.length) { $h.append('<div class="history-empty">אין שיחות עדיין</div>'); return; }
    history.forEach(function (c) {
      var cls  = c.dir === 'in' ? (c.duration ? 'in' : 'missed') : 'out';
      var icon = c.dir === 'in' ? (c.duration ? '↙' : '↙') : '↗';
      var $row = $('<div class="history-row"></div>')
        .append($('<div class="ico"></div>').addClass(cls).text(icon))
        .append($('<div class="body"></div>')
          .append($('<div class="num"></div>').text(c.number || '—'))
          .append($('<div class="meta"></div>').text(fmtAgo(c.ts))))
        .append($('<div class="dur"></div>').text(fmtDuration(c.duration)));
      $row.on('click', function () {
        if (!c.number) return;
        dialed = String(c.number).replace(/[^0-9*#+]/g, ''); renderNum();
      });
      $h.append($row);
    });
  }
  $('#clearHistory').on('click', function (e) {
    e.preventDefault(); history = [];
    try { localStorage.removeItem(HIST_LS); } catch (e) {}
    renderHistory();
  });
  renderHistory();

  // ── Init: load SIP config from server then auto-connect ───────────────────────
  $.getJSON('/api/sip-config')
    .done(function (cfg) {
      if (cfg && cfg.server) $('#s_server').val(cfg.server);
      if (cfg && cfg.ext)    $('#s_ext').val(cfg.ext);
      if (cfg && cfg.user)   $('#s_user').val(cfg.user);
      if (cfg && cfg.pass)   $('#s_pass').val(cfg.pass);
    })
    .always(function () {
      var s = readSettings();
      if (s.server && (s.ext || s.user) && s.pass) {
        log('מתחבר אוטומטית…', 'info'); register();
      } else {
        setExtInfo('הגדרות SIP לא נמצאו — הגדר ב-.env');
        $('#connForm').show(); $('#connToggle').text('▲ הסתר');
      }
    });

  $(window).on('beforeunload', function (e) {
    if (session || (ua && ua.isRegistered && ua.isRegistered())) {
      e.preventDefault(); e.originalEvent.returnValue = ''; return '';
    }
  });

})();
</script>
</body>
</html>
